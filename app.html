<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 NBA Mock Draft Game</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #f0f4f8; color: #1a1a1a; padding: 30px 20px; }
        h1 { font-size: 2em; color: #1a2e4a; margin-bottom: 6px; }
        .sub { font-size: 15px; color: #555; margin-bottom: 24px; }
        .game { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
        .panel h2 { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 14px; text-transform: uppercase; letter-spacing: .5px; }
        .prospect { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; cursor: pointer; background: #f8f9fa; transition: background .15s; }
        .prospect:hover { background: #e8f0fb; border-color: #aac4ee; }
        .prospect .name { font-size: 14px; font-weight: 600; color: #1a2e4a; }
        .prospect .school { font-size: 12px; color: #888; }
        .prospect.used { opacity: .35; pointer-events: none; }
        .slot { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; min-height: 50px; background: #f8f9fa; }
        .slot-num { font-size: 13px; font-weight: 600; color: #aaa; min-width: 22px; }
        .slot-name { font-size: 14px; font-weight: 600; color: #1a2e4a; }
        .slot-school { font-size: 12px; color: #888; }
        .slot-empty { font-size: 13px; color: #bbb; flex: 1; }
        .remove-btn { font-size: 12px; color: #888; cursor: pointer; padding: 2px 7px; border-radius: 4px; border: 1px solid #ddd; background: transparent; }
        .remove-btn:hover { background: #fde8e8; color: #c0392b; }
        #submit-btn { width: 100%; padding: 12px; margin-top: 16px; font-size: 15px; font-weight: 600; cursor: pointer; border-radius: 8px; border: 1px solid #1a2e4a; background: #1a2e4a; color: #fff; }
        #submit-btn:hover { background: #243f66; }
        #submit-btn:disabled { opacity: .4; cursor: not-allowed; }
        #results { margin-top: 28px; display: none; }
        #results h2 { font-size: 20px; font-weight: 600; color: #1a2e4a; margin-bottom: 12px; }
        .score-bar { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 20px; }
        .score-num { font-size: 40px; font-weight: 700; color: #1a2e4a; }
        .score-label { font-size: 13px; color: #888; margin-top: 2px; }
        .col-head { display: grid; grid-template-columns: 28px 1fr 1fr 70px; gap: 8px; padding: 0 12px; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
        .result-row { display: grid; grid-template-columns: 28px 1fr 1fr 70px; gap: 8px; align-items: center; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
        .result-row.correct { background: #eaf3de; color: #27500a; }
        .result-row.close { background: #faeeda; color: #633806; }
        .result-row.wrong { background: #fcebeb; color: #791f1f; }
        .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; text-align: center; }
        .correct .badge { background: #c0dd97; color: #27500a; }
        .close .badge { background: #fac775; color: #633806; }
        .wrong .badge { background: #f7c1c1; color: #791f1f; }
        #reset-btn { margin-top: 14px; font-size: 13px; color: #555; cursor: pointer; background: none; border: none; text-decoration: underline; padding: 0; }
        .back-link { display: inline-block; margin-bottom: 20px; font-size: 14px; color: #1a2e4a; text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        .source { font-size: 12px; color: #aaa; margin-bottom: 20px; }
        @media (max-width: 600px) { .game { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <a href="scratch.html" class="back-link">← Back to Draft Central</a>
    <h1>2026 NBA Mock Draft</h1>
    <p class="sub">Click prospects to fill your draft board. Lock in all 10 picks to reveal your score!</p>
    <p class="source">Rankings based on ESPN's 2026 NBA Draft Big Board</p>

    <div class="game">
        <div class="panel">
            <h2>Available Prospects</h2>
            <div id="prospect-list"></div>
        </div>
        <div class="panel">
            <h2>Your Draft Board</h2>
            <div id="draft-board"></div>
        </div>
    </div>

    <button id="submit-btn" disabled>Reveal Results</button>

    <div id="results">
        <h2>Your Results</h2>
        <div class="score-bar">
            <div class="score-num" id="score-display">0</div>
            <div>
                <div style="font-size:17px;font-weight:600;color:#1a2e4a" id="score-msg"></div>
                <div class="score-label">points out of 100</div>
            </div>
        </div>
        <div class="col-head"><span>#</span><span>Your pick</span><span>Expert pick</span><span>Result</span></div>
        <div id="result-rows"></div>
        <button id="reset-btn">Play again</button>
    </div>

    <script>
        const prospects = [
            {name: "Darryn Peterson",    school: "Kansas"},
            {name: "AJ Dybantsa",        school: "BYU"},
            {name: "Cameron Boozer",     school: "Duke"},
            {name: "Caleb Wilson",       school: "North Carolina"},
            {name: "Kingston Flemings",  school: "Houston"},
            {name: "Keaton Wagler",      school: "Illinois"},
            {name: "Nate Ament",         school: "Tennessee"},
            {name: "Darius Acuff Jr.",   school: "Arkansas"},
            {name: "Mikel Brown Jr.",    school: "Louisville"},
            {name: "Karim Lopez",        school: "New Zealand Breakers"}
        ];
        const consensus = [
            "Darryn Peterson",
            "AJ Dybantsa",
            "Cameron Boozer",
            "Caleb Wilson",
            "Kingston Flemings",
            "Keaton Wagler",
            "Nate Ament",
            "Darius Acuff Jr.",
            "Mikel Brown Jr.",
            "Karim Lopez"
        ];
        let board = Array(10).fill(null);

        function getUsed() { return board.filter(Boolean).map(p => p.name); }

        function renderProspects() {
            const used = getUsed();
            document.getElementById('prospect-list').innerHTML = prospects.map(p => `
                <div class="prospect${used.includes(p.name) ? ' used' : ''}" onclick="addPick('${p.name}')">
                    <div><div class="name">${p.name}</div><div class="school">${p.school}</div></div>
                </div>`).join('');
        }

        function renderBoard() {
            document.getElementById('draft-board').innerHTML = board.map((p, i) => `
                <div class="slot">
                    <span class="slot-num">${i + 1}</span>
                    ${p ? `<div style="flex:1"><div class="slot-name">${p.name}</div><div class="slot-school">${p.school}</div></div>
                    <button class="remove-btn" onclick="removePick(${i})">✕</button>`
                    : `<span class="slot-empty">Click a prospect →</span>`}
                </div>`).join('');
            document.getElementById('submit-btn').disabled = board.some(s => !s);
        }

        function addPick(name) {
            const idx = board.indexOf(null);
            if (idx === -1) return;
            board[idx] = prospects.find(p => p.name === name);
            renderProspects(); renderBoard();
        }

        function removePick(i) {
            board[i] = null;
            renderProspects(); renderBoard();
        }

        document.getElementById('submit-btn').onclick = function() {
            let score = 0;
            const rows = board.map((p, i) => {
                const correct = consensus[i] === p.name;
                const off = Math.abs(consensus.indexOf(p.name) - i);
                let pts = 0, cls, badge;
                if (correct)        { pts = 10; cls = 'correct'; badge = 'Exact'; }
                else if (off === 1) { pts = 5;  cls = 'close';   badge = '±1';   }
                else if (off === 2) { pts = 3;  cls = 'close';   badge = '±2';   }
                else                { pts = 0;  cls = 'wrong';   badge = 'Miss'; }
                score += pts;
                return `<div class="result-row ${cls}">
                    <span style="font-weight:600">${i + 1}</span>
                    <span>${p.name}</span>
                    <span>${consensus[i]}</span>
                    <span class="badge">${badge}</span>
                </div>`;
            });
            document.getElementById('score-display').textContent = score;
            const msgs = ['Keep scouting!', 'Not bad, scout!', 'Solid draft eye!', 'Great picks!', 'Perfect draft!'];
            document.getElementById('score-msg').textContent = score >= 90 ? msgs[4] : score >= 70 ? msgs[3] : score >= 50 ? msgs[2] : score >= 30 ? msgs[1] : msgs[0];
            document.getElementById('result-rows').innerHTML = rows.join('');
            document.getElementById('results').style.display = 'block';
            document.getElementById('submit-btn').style.display = 'none';
        };

        document.getElementById('reset-btn').onclick = function() {
            board = Array(10).fill(null);
            document.getElementById('results').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
            renderProspects(); renderBoard();
        };

        renderProspects(); renderBoard();
    </script>
</body>
</html>
